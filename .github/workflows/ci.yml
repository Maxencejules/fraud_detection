name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest -q

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 40
    env:
      EMIT_RATE_TPS: "100"
      REPORT_INTERVAL_S: "15"
      BUFFER_THRESHOLD: "20"
      BATCH_SIZE: "20"
      CONSUMER_METRICS_PORT: "9108"
      MONITOR_METRICS_PORT: "9109"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install local script dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Generate training and reference data
        run: python scripts/gen_training_data.py

      - name: Start infrastructure and services
        run: docker compose up -d --build zookeeper kafka redis postgres mlflow consumer predictor monitor

      - name: Train and register model
        run: docker compose --profile train run --rm trainer

      - name: Reload predictor model
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS -X POST http://localhost:8000/reload-model; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Start event producer
        run: docker compose up -d producer

      - name: Run smoke test
        run: python scripts/smoke_test_stack.py --base-url http://localhost:8000 --reports-dir reports --timeout 180

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
