services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud_net
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fraud_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - fraud_net

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - fraud_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fraud_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres:5432/mlflow
      ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server 
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0 
      --port 5000
    networks:
      - fraud_net

  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOPIC_TRANSACTIONS: transactions.raw
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fraud_net

  consumer:
    build:
      context: .
      dockerfile: services/consumer/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      TOPIC_TRANSACTIONS: transactions.raw
      TOPIC_FEATURES: transactions.features
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fraud_net

  predictor:
    build:
      context: .
      dockerfile: services/predictor/Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/fraud-detector/Production
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - fraud_net

  monitor:
    build:
      context: .
      dockerfile: services/monitor/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REFERENCE_PATH: /app/data/reference.parquet
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./shared:/app/shared
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - fraud_net

  trainer:
    build:
      context: .
      dockerfile: services/trainer/Dockerfile
    profiles:
      - train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./shared:/app/shared
    depends_on:
      mlflow:
        condition: service_started
    networks:
      - fraud_net

networks:
  fraud_net:
    driver: bridge

volumes:
  postgres_data:
  mlflow_artifacts:
